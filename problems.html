<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kho bài tập Toán 11</title>

  <link rel="stylesheet" href="assets/css/style.css" />

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)'], ['$', '$']],
        displayMath: [['\\[', '\\]']]
      },
      svg: {
        fontCache: 'global'
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>

<body>
  <header class="topbar">
    <a class="brand" href="index.html">
      <span class="logo">11</span>
      <span>Bài tập Toán 11</span>
    </a>

    <nav class="nav">
      <a href="index.html">Trang chủ</a>
      <a href="problems.html">Kho bài tập</a>
      <a href="index.html#about">Giới thiệu</a>
    </nav>
  </header>

  <main class="page">
    <section class="page-head">
      <p class="tag">Kho bài tập</p>
      <h1>Danh sách bài tập Toán 11</h1>
      <p>Tìm kiếm bài tập theo tên, chuyên đề hoặc mức độ khó.</p>
    </section>

    <section class="filter-box">
      <input id="searchInput" type="text" placeholder="Tìm bài tập..." />

      <select id="categoryFilter">
        <option value="all">Tất cả chuyên đề</option>
        <option value="algebra">Đại số - Giải tích</option>
        <option value="geometry">Hình học</option>
        <option value="combinatorics">Tổ hợp - Xác suất</option>
        <option value="exam">Đề tổng hợp</option>
      </select>

      <select id="levelFilter">
        <option value="all">Tất cả mức độ</option>
        <option value="Dễ">Dễ</option>
        <option value="Trung bình">Trung bình</option>
        <option value="Khó">Khó</option>
        <option value="HSG">HSG</option>
      </select>
    </section>

    <section>
      <div id="problemCount" class="count-text"></div>
      <div id="problemList" class="problem-grid"></div>
    </section>
  </main>

  <footer class="footer">
    © 2026 - Bài tập Toán 11
  </footer>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
