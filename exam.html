<!-- exam.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đề thi Toán 11 HK2</title>
  <link rel="stylesheet" href="assets/css/style.css" />

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [["\\(", "\\)"], ["$", "$"]],
        displayMath: [["\\[", "\\]"]]
      },
      svg: { fontCache: "global" }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>

<body>
  <header class="topbar no-print">
    <div>
      <h1>Xem đề thi</h1>
      <p>Kiểm tra trước khi in hoặc xuất PDF</p>
    </div>

    <div class="top-actions">
      <button id="backBtn" class="ghost-btn">Quay lại chỉnh đề</button>
      <button id="printBtn" class="main-btn">In / Xuất PDF</button>
    </div>
  </header>

  <main class="container exam-container">
    <section id="examView" class="exam-paper"></section>
  </main>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/exam.js"></script>
</body>
</html>
