<!-- index.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tạo đề thi Toán 11 HK2</title>
  <link rel="stylesheet" href="assets/css/style.css" />

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [["\\(", "\\)"], ["$", "$"]],
        displayMath: [["\\[", "\\]"]]
      },
      svg: { fontCache: "global" }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>

<body>
  <header class="topbar">
    <div>
      <h1>Tạo đề thi Toán 11 HK2</h1>
      <p>Chọn số câu theo từng chuyên đề</p>
    </div>
    <button id="themeBtn" class="ghost-btn">🌙</button>
  </header>

  <main class="container">
    <section class="card">
      <div class="grid-2">
        <label>
          Tên đề
          <input id="examTitle" type="text" value="Đề kiểm tra Toán 11 học kỳ 2" />
        </label>

        <label>
          Mã đề
          <input id="examCode" type="text" value="101" />
        </label>
      </div>

      <div class="option-row">
        <label class="check">
          <input id="shuffleQuestions" type="checkbox" checked />
          Trộn câu hỏi
        </label>

        <label class="check">
          <input id="showSolution" type="checkbox" />
          Xuất kèm đáp án và lời giải
        </label>
      </div>
    </section>

    <section id="builder"></section>

    <section class="action-bar">
      <button id="resetBtn" class="ghost-btn">Đặt lại</button>
      <button id="createBtn" class="main-btn">Tạo đề</button>
    </section>
  </main>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
